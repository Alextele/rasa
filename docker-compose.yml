services:
  rasa:
    image: rasa/rasa:3.6.20
    container_name: rasa_server
    ports:
      - "5005:5005"
    volumes:
      - ./:/app
    command: run --enable-api --cors "*" --debug --endpoints endpoints.yml
    environment:
      - TZ=Europe/Moscow
    depends_on:
      - action_server

  action_server:
    image: rasa/rasa-sdk:3.6.2
    container_name: action_server
    ports:
      - "5055:5055"
    volumes:
      - ./actions:/app/actions
    command: start --actions actions
    environment:
      - TZ=Europe/Moscow
