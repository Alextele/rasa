version: "3.1"

intents:
  - greet
  - goodbye
  - ask_weather

entities:
  - city

slots:
  city:
    type: text
    mappings:
      - type: from_entity
        entity: city

responses:
  utter_greet:
    - text: "Привет! Чем могу помочь?"
  utter_goodbye:
    - text: "Пока!"
  utter_ask_city:
    - text: "В каком городе тебя интересует погода?"

actions:
  - action_get_weather
